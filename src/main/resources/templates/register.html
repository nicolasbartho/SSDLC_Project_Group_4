<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Mini Library</title>
</head>
<body>
    <h1>Create an account</h1>

    <form th:action="@{/register}" th:object="${registerForm}" method="post">
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" maxlength="50" required>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red"></span>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" maxlength="254" required>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></span>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" maxlength="128" required>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></span>
            <small>At least 8 characters, with a letter and a digit.</small>
        </div>
        <button type="submit">Register</button>
    </form>

    <p><a href="/login">Already have an account? Log in</a></p>
</body>
</html>
