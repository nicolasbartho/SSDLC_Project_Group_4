<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log in - Mini Library</title>
</head>
<body>
    <h1>Log in</h1>

    <!-- Generic error message only - never reveal whether the username
         exists or which of the two fields was wrong (avoids user
         enumeration / account probing). -->
    <p th:if="${param.error}" style="color:red">Invalid username or password.</p>
    <p th:if="${param.logout}" style="color:green">You have been logged out.</p>
    <p th:if="${param.registered}" style="color:green">Account created, you can now log in.</p>

    <form th:action="@{/login}" method="post">
        <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" maxlength="50" required autofocus>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" maxlength="128" required>
        </div>
        <button type="submit">Log in</button>
    </form>

    <p><a href="/register">Create an account</a></p>
</body>
</html>
