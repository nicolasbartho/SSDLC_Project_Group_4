name: Secure CI/CD Pipeline

# Stages: push/PR -> build & test -> SAST -> dependency scan -> DAST (staging) -> pass/fail gate
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn -B clean verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-app-jar
          path: target/*.jar

  sast:
    name: Static Analysis (Semgrep)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/java
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        # Pipeline fails automatically on ERROR-severity findings
        # (semgrep-action's default exit-code behaviour).

  dependency-scan:
    name: Dependency / SCA Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'library-management'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7

      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # NOTE: deploy + DAST scan must live in the SAME job. Each GitHub Actions
  # job runs on its own fresh, isolated runner/VM, so an app process started
  # in one job is gone by the time a later job starts - ZAP would have
  # nothing to connect to. Keeping "start the app" and "scan the app" in one
  # job is what actually lets DAST reach a live target.
  deploy-and-dast:
    name: Deploy to Staging + Dynamic Analysis (OWASP ZAP)
    needs: [sast, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: library-app-jar
          path: target/

      - name: Start application (staging, ephemeral)
        run: |
          nohup java -jar target/*.jar --spring.profiles.active=staging \
            > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for application readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/login > /dev/null; then
              echo "Application is up"
              exit 0
            fi
            echo "Waiting for application to start... ($i/30)"
            sleep 2
          done
          echo "Application did not become ready in time"
          cat app.log
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: true
          cmd_options: '-a'
          # Optional: point to a rules file to downgrade accepted
          # false positives/low-priority findings instead of failing on them.
          # rules_file_name: '.zap/rules.tsv'

      - name: Stop application
        if: always()
        run: kill "$(cat app.pid)" || true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  pass-fail-gate:
    name: Security Gate
    needs: [sast, dependency-scan, deploy-and-dast]
    runs-on: ubuntu-latest
    steps:
      - name: All security checks passed
        run: echo "SAST, dependency scan and DAST all passed. Safe to merge/deploy."
